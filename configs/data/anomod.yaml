# Train-Ticket 故障注入数据集配置
# 字段口径详见 docs/agent-docs/dataset-guide.md

name: anomod
root: data/anomod

# 11 个 case：1 正常 + 10 故障注入
# Lv_S_KILLPOD_gateway 排除：trace 数据缺失
cases:
  train:
    - Normal
  eval:
    - Normal
    - Lv_P_DISKIO_preserve
    - Lv_P_NETLOSS_preserve
    - Lv_S_HTTPABORT_preserve
    - Lv_S_DNSFAIL_preserve_no_order
    - Lv_S_KILLPOD_preserve
    - Lv_S_KILLPOD_order
    - Lv_D_cachelimit
    - Lv_D_CONNECTION_POOL_exhaustion
    - Lv_D_TRANSACTION_timeout

# pipeline 产物文件名（_pipeline_out/ 下）
fused_file: tt_fused_15s.csv

# 时间窗口（秒）
window_size_sec: 15

# 异常标签来源：case_metadata.json 的 inject_start_ms / inject_end_ms（毫秒精度）
# 训练使用：Normal case 全程 + 异常 case 的 baseline/recover 阶段（phase != 'inject'）
# 评估使用全部 phase

# 多模态粒度（架构性约束）:
#   endpoint 级: api_responses, traces
#   service 级:  metrics (Prometheus), logs  -- 无 per-endpoint 粒度
